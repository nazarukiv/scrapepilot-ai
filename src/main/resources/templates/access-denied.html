<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScrapePilot AI / Access Denied</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}">
</head>
<body>
<div class="dashboard-shell">
    <header class="topbar">
        <div>
            <p class="eyebrow">[auth]</p>
            <h1>Access Denied</h1>
        </div>
        <div class="topbar-actions">
            <nav class="topbar-links" aria-label="Access denied navigation">
                <a th:href="@{/dashboard}">dashboard</a>
            </nav>
            <div class="auth-nav" th:if="${authenticatedUser != null}">
                <span class="auth-user">
                    <span th:text="${authenticatedUser.username}">admin</span>
                    <span class="status-badge status-active" th:text="${authenticatedUser.roleLabel}">ADMIN</span>
                </span>
                <form th:action="@{/logout}" method="post">
                    <button class="button-secondary button-compact" type="submit">Logout</button>
                </form>
            </div>
        </div>
    </header>

    <main>
        <section class="section-block" aria-labelledby="access-denied-heading">
            <div class="section-heading">
                <div>
                    <p class="eyebrow">[403]</p>
                    <h2 id="access-denied-heading">Insufficient Access</h2>
                </div>
                <span class="section-meta">authorization blocked</span>
            </div>

            <div class="empty-state">
                <span class="empty-marker">[ ]</span>
                <div>
                    <strong>admin authorization required</strong>
                    <span>The requested operation is restricted.</span>
                </div>
            </div>
        </section>
    </main>
</div>
</body>
</html>
